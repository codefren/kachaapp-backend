services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: kachadigitalbcn_local_django
    container_name: kachadigitalbcn_local_django
    volumes:
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
    ports:
      - '8888:8000'
    command: /start
    depends_on:
      - redis
    networks:
      - optimroute

  redis:
    image: docker.io/redis:6
    container_name: kachadigitalbcn_local_redis
    networks:
      - optimroute

  celeryworker:
    <<: *django
    image: kachadigitalbcn_local_celeryworker
    container_name: kachadigitalbcn_local_celeryworker
    depends_on:
      - redis
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: kachadigitalbcn_local_celerybeat
    container_name: kachadigitalbcn_local_celerybeat
    depends_on:
      - redis
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    image: kachadigitalbcn_local_flower
    container_name: kachadigitalbcn_local_flower
    depends_on:
      - redis
      - celeryworker
    ports:
      - '5555:5555'
    command: /start-flower

networks:
  optimroute:
    external: true
