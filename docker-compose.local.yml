services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: kachadigitalbcn_local_django
    container_name: kachadigitalbcn_local_django
    volumes:
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
    ports:
      - '8888:8000'
    command: /start

    networks:
      - optimroute

networks:
  optimroute:
    external: true
